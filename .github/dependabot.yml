version: 2
updates:
  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      dev-dependencies:
        patterns: ["pytest*", "ruff*", "mypy*", "black*"]
      prod-dependencies:
        patterns: ["fastapi*", "uvicorn*", "pydantic*", "httpx*", "sqlite-utils*", "gitpython*"]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      github-actions:
        patterns: ["*"]

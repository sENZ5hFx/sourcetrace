name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    name: Lint + Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Detect dependency file
        id: deps
        run: |
          REQ=$(find . -maxdepth 2 -name 'requirements*.txt' | head -n1)
          if [ -n "$REQ" ] || [ -f pyproject.toml ]; then
            echo "cache=pip" >> $GITHUB_OUTPUT
            echo "req_file=${REQ:-pyproject.toml}" >> $GITHUB_OUTPUT
          else
            echo "cache=" >> $GITHUB_OUTPUT
            echo "req_file=" >> $GITHUB_OUTPUT
          fi

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.11'
          cache: ${{ steps.deps.outputs.cache }}
          cache-dependency-path: ${{ steps.deps.outputs.req_file }}

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          REQ=$(find . -maxdepth 2 -name 'requirements*.txt' | head -n1)
          [ -n "$REQ" ] && pip install -r "$REQ"
          [ -f requirements-dev.txt ] && pip install -r requirements-dev.txt
          [ -f pyproject.toml ] && pip install -e . --quiet 2>/dev/null || true
          pip install pytest ruff

      - name: Lint (ruff check)
        run: ruff check . --output-format=github

      - name: Format check (ruff format)
        run: |
          if [ "${{ github.actor }}" = "github-actions[bot]" ]; then
            echo "::notice::Skipping format check — triggered by auto-fixer commit"
          else
            ruff format --check .
          fi

      - name: Run tests
        run: |
          if [ -d tests ] && [ "$(find tests -name '*.py' | wc -l)" -gt 0 ]; then
            pytest tests/ -v --tb=short
          else
            echo '::notice::No tests found — skipping'
          fi

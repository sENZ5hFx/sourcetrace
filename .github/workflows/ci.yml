name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  structure-guard:
    name: Required Files Guard
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Assert required files
        run: |
          MISSING=0
          for f in LICENSE README.md; do
            if [ ! -f "$f" ]; then
              echo "::error::Missing required file: $f"
              MISSING=1
            fi
          done
          exit $MISSING

  lint-and-test:
    name: Lint + Tests
    runs-on: ubuntu-latest
    needs: structure-guard
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Detect dependency file
        id: deps
        run: |
          if [ -f requirements-dev.txt ]; then
            echo "req_file=requirements-dev.txt" >> $GITHUB_OUTPUT
            echo "cache=pip" >> $GITHUB_OUTPUT
            echo "has_deps=true" >> $GITHUB_OUTPUT
          elif [ -f requirements.txt ]; then
            echo "req_file=requirements.txt" >> $GITHUB_OUTPUT
            echo "cache=pip" >> $GITHUB_OUTPUT
            echo "has_deps=true" >> $GITHUB_OUTPUT
          elif [ -f pyproject.toml ]; then
            echo "req_file=pyproject.toml" >> $GITHUB_OUTPUT
            echo "cache=pip" >> $GITHUB_OUTPUT
            echo "has_deps=true" >> $GITHUB_OUTPUT
          else
            echo "req_file=" >> $GITHUB_OUTPUT
            echo "cache=" >> $GITHUB_OUTPUT
            echo "has_deps=false" >> $GITHUB_OUTPUT
          fi

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.11'
          cache: ${{ steps.deps.outputs.cache || '' }}
          cache-dependency-path: ${{ steps.deps.outputs.req_file || '' }}

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          for req in requirements.txt requirements-dev.txt requirements-test.txt; do
            [ -f "$req" ] && pip install -r "$req"
          done
          if [ -f pyproject.toml ] || [ -f setup.py ]; then
            pip install -e . --quiet || echo "::warning::Editable install failed — continuing without it"
          fi
          pip install pytest ruff

      - name: Lint (ruff check)
        run: ruff check . --output-format=github

      - name: Format check (ruff format)
        run: |
          if [ "${{ github.actor }}" = "github-actions[bot]" ]; then
            echo "::notice::Skipping format check — triggered by auto-fixer commit"
          else
            ruff format --check .
          fi

      - name: Run tests
        run: |
          TEST_DIRS=$(find . -maxdepth 3 -type d -name 'tests' | head -n5)
          if [ -n "$TEST_DIRS" ] && find . -maxdepth 4 -path '*/tests/*.py' | grep -q .; then
            pytest $TEST_DIRS -v --tb=short
          else
            echo '::notice::No tests found — skipping'
          fi

      - name: Job summary
        if: always()
        run: |
          echo "## CI — ${{ github.repository }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Step | Result |" >> "$GITHUB_STEP_SUMMARY"
          echo "|------|--------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Lint (ruff check) | see logs |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Format (ruff format) | see logs |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Tests (pytest) | see logs |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Ran at | $(date -u '+%Y-%m-%d %H:%M UTC') |" >> "$GITHUB_STEP_SUMMARY"

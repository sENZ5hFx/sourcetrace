name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  structure-guard:
    name: Required Files Guard
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Assert required files
        run: |
          MISSING=0
          for f in LICENSE README.md pyproject.toml requirements.txt; do
            if [ ! -f "$f" ]; then
              echo "::error::Missing required file: $f"
              MISSING=1
            fi
          done
          exit $MISSING

  lint-and-test:
    name: Lint + Tests
    runs-on: ubuntu-latest
    needs: structure-guard
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'requirements-dev.txt'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Lint (ruff check)
        run: ruff check . --output-format=github

      - name: Format check (ruff format)
        run: |
          if [ "${{ github.actor }}" = "github-actions[bot]" ]; then
            echo "::notice::Skipping format check — triggered by auto-fixer commit"
          else
            ruff format --check .
          fi

      - name: Run tests
        run: pytest tests/ -v --tb=short

      - name: Job summary
        if: always()
        run: |
          echo "## CI — ${{ github.repository }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Step | Result |" >> "$GITHUB_STEP_SUMMARY"
          echo "|------|--------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Lint (ruff check) | see logs |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Format (ruff format) | see logs |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Tests (pytest) | see logs |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Ran at | $(date -u '+%Y-%m-%d %H:%M UTC') |" >> "$GITHUB_STEP_SUMMARY"

  ip-integrity:
    name: IP Integrity Guard
    runs-on: ubuntu-latest
    needs: structure-guard
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Assert IP protection files present
        run: |
          MISSING=0
          for f in IP_DISCLOSURE.md LICENSE PATENT.md TRADEMARK.md COPYRIGHT_AND_ATTRIBUTIONS.md NOTICE; do
            if [ ! -f "$f" ]; then
              echo "::error::Missing IP protection file: $f"
              MISSING=1
            fi
          done
          exit $MISSING
      - name: Assert copyright headers in source files
        run: |
          MISSING=0
          for f in $(find . -name '*.py' -not -path './.git/*'); do
            if ! grep -q 'Copyright' "$f"; then
              echo "::warning::Missing copyright header: $f"
            fi
          done
          exit $MISSING
